server:
  port: 8082

spring:
  application:
    name: review-service

  datasource:
    url: jdbc:postgresql://localhost:5433/safetag_reviews
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
